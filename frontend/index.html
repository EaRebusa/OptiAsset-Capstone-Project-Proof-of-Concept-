<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="favicon" type="image/svg+xml" href="/logo.svg" />
    <link rel="alternate icon" href="/Optiasstet Icon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OptiAsset - Fleet Health Manager</title>
    <script>
      (function() {
        const favicon = document.getElementById('favicon');
        const originalHref = favicon.href;

        function updateFavicon(e) {
          const isDark = e.matches;
          if (isDark) {
            // Create a canvas to invert the logo colors
            const img = new Image();
            img.src = originalHref;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              canvas.width = img.width;
              canvas.height = img.height;
              const ctx = canvas.getContext('2d');

              // Draw image
              ctx.drawImage(img, 0, 0);

              // Invert colors using composite operation
              // This assumes the logo is black on transparent or white on transparent
              // 'difference' with white will invert colors
              ctx.globalCompositeOperation = 'difference';
              ctx.fillStyle = 'white';
              ctx.fillRect(0, 0, canvas.width, canvas.height);

              // Reset composite to keep transparency (optional, depending on logo)
              // If logo has transparency, 'difference' might make background white.
              // Better approach for simple monochrome icons:
              // Source-in to keep alpha, but change color?

              // Let's try a simpler approach for inverting:
              // Get image data
              const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const data = imgData.data;

              // However, 'difference' against white turns transparent (0,0,0,0) to (255,255,255,255) which is white box.
              // We want to keep transparency.

              // Let's redraw:
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(img, 0, 0);

              // Only invert RGB, keep Alpha
              ctx.globalCompositeOperation = 'source-in';
              ctx.fillStyle = 'white'; // Turn everything visible to white
              ctx.fillRect(0, 0, canvas.width, canvas.height);

              favicon.href = canvas.toDataURL('image/png');
            };
          } else {
            favicon.href = originalHref;
          }
        }

        // Check system preference
        const matcher = window.matchMedia('(prefers-color-scheme: dark)');
        matcher.addEventListener('change', updateFavicon);
        updateFavicon(matcher);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
